name: Backend tests

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main, staging]
    paths:
      - 'backend/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run backend tests
        run: npm test --workspace=backend
